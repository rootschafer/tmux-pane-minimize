name: release

# Tag v* -> cross-build the engine for every supported target, publish the binaries (plus
# SHA256SUMS) as a GitHub release, then pin that release in scripts/engine.manifest on main
# so ensure-engine.sh knows exactly what to download and what it must hash to.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: true            # a missing target must block the release, not ship a hole
      matrix:
        include:
          # Linux is musl-static so one binary runs on any distro (glibc or not).
          - { target: x86_64-unknown-linux-musl,  os: ubuntu-latest }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-24.04-arm }
          - { target: x86_64-apple-darwin,        os: macos-15-intel }
          - { target: aarch64-apple-darwin,       os: macos-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: musl tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Smoke test (every runner is native to its target)
        run: target/${{ matrix.target }}/release/tmux-min-transform --version

      - name: Stage asset
        run: cp "target/${{ matrix.target }}/release/tmux-min-transform" "tmux-min-transform-${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: engine-${{ matrix.target }}
          path: tmux-min-transform-${{ matrix.target }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Checkout main (not the tag) because the manifest pin below is committed to main.
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: cd dist && sha256sum tmux-min-transform-* > SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      - name: Pin engine in scripts/engine.manifest on main
        run: |
          {
            echo "# tmux-pane-minimize engine pin — written by .github/workflows/release.yml."
            echo "# ensure-engine.sh downloads tmux-min-transform-<target> from this release and"
            echo "# refuses to install it unless its sha256 matches the line below for the target."
            echo "repo $GITHUB_REPOSITORY"
            echo "version $GITHUB_REF_NAME"
            while read -r hash file; do
              echo "sha256 ${file#tmux-min-transform-} $hash"
            done < dist/SHA256SUMS
          } > scripts/engine.manifest
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/engine.manifest
          git commit -m "release: pin engine $GITHUB_REF_NAME in engine.manifest"
          # main may have moved since this job checked it out
          git pull --rebase origin main
          git push origin main
